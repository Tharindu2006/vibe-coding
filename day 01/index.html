<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Profile Card</title>

  <!-- Head section: Google font + internal CSS styling -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    /* CSS styling section */
    :root{
      --card-bg: rgba(255,255,255,0.9);
      --accent: linear-gradient(135deg,#6a11cb 0%,#2575fc 100%);
      --shadow: 0 10px 30px rgba(16,24,40,0.18);
    }
    html,body{
      height:100%;
      margin:0;
      font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background: radial-gradient(circle at 10% 10%, rgba(255,255,255,0.04), transparent 10%),
                  linear-gradient(180deg,#0f172a 0%, #07103a 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
      color:#0b1220;
    }

    /* Page gradient overlay for visual vibe */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(56,189,248,0.08));
      pointer-events:none;
      mix-blend-mode:screen;
    }

    /* Card container */
    .card{
      width:320px;
      background: var(--card-bg);
      border-radius:18px;               /* rounded corners */
      box-shadow: var(--shadow);        /* shadow */
      overflow:hidden;
      text-align:center;
      padding:28px 22px;
      backdrop-filter: blur(6px);
      border:1px solid rgba(255,255,255,0.06);
    }

    .accent-strip{
      height:6px;
      width:100%;
      border-radius:8px;
      margin-bottom:16px;
      background: var(--accent);        /* gradient accent */
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:999px;              /* circular image */
      overflow:hidden;
      margin:0 auto 14px;
      border:4px solid rgba(255,255,255,0.85);
      box-shadow: 0 8px 20px rgba(16,24,40,0.12);
    }
    .profile-img img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .name{
      font-size:1.15rem;
      font-weight:700;
      margin:6px 0 2px;
      color:#071033;
    }
    .stream{
      font-size:0.9rem;
      color:#334155;
      margin-bottom:10px;
      font-weight:500;
    }
    .bio{
      font-size:0.9rem;
      color:#475569;
      line-height:1.4;
      padding:0 6px 12px;
    }

    /* small action area */
    .meta{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:8px;
    }
    .tag{
      background: linear-gradient(180deg,#eef2ff, #f8fafc);
      padding:6px 10px;
      border-radius:999px;
      font-size:0.78rem;
      color:#0b1220;
      box-shadow: 0 4px 10px rgba(12,18,40,0.06);
    }

    /* responsive tweak */
    @media (max-width:380px){
      .card{ width:92%; padding:20px; }
      .profile-img{ width:100px; height:100px; }
    }
  </style>
</head>
<body>
  <!-- <div> structure: outer .card -> .accent-strip, .profile-img, .card-body (.name, .stream, .bio), .meta -->
  <div class="card" role="region" aria-label="Student profile card">
    <div class="accent-strip" aria-hidden="true"></div>

    <div class="profile-img">
      <img src="image.jpg" alt="Profile placeholder">
    </div>

    <div class="card-body">
      <div class="name">Tharindu Pathirage</div>
      <div class="stream">Computer Science • Frontend</div>
      <div class="bio">Enthusiastic developer building delightful interfaces. Loves JS, design systems, and coffee-fueled debugging sessions.</div>
    </div>

    <div class="meta" aria-hidden="true">
      <div class="tag">Year 2</div>
      <div class="tag">UI / UX</div>
    </div>
  </div>
</body>
</html>
